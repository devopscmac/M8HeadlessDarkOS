# RetroArch configuration overrides for R36S Plus
# 720x720 square IPS display, RK3326 SoC
# This file is applied as an overlay on top of the base RetroArch config

# Video output — 720x720 square display
video_fullscreen = true
video_fullscreen_x = "720"
video_fullscreen_y = "720"

# Keep aspect ratio correct for square screen
# Most games are 4:3 — use integer scale + black borders
video_aspect_ratio_auto = "false"
video_aspect_ratio = "-1"

# Integer scaling preserves sharp pixels
video_scale_integer = "true"

# Video driver: use KMS/DRM for bare-metal display (no X11)
video_driver = "kms"

# Audio driver: use ALSA (matches dArkOS RK3326 setup)
audio_driver = "alsa"

# Performance: set to ondemand governor (perfmax overrides to performance in-game)
cpu_governor = "ondemand"

# Input: R36S Plus button mapping
# These match the standard GO-Super Gamepad layout used in dArkOS
input_driver = "udev"
