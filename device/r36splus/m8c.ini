; =============================================================================
; m8c configuration for R36S Plus (PK3326 / RK3326, 720x720 display)
; =============================================================================
; Place this file at: ~/.local/share/m8c/config.ini
; Or specify with: m8c --config /path/to/config.ini
;
; Key reference: https://wiki.libsdl.org/SDL3/SDL_Scancode
; =============================================================================

[graphics]
; Start in fullscreen mode (recommended for handheld)
init_fullscreen = true

; Use integer scaling to preserve pixel accuracy
; M8 native resolution is 320x240; 2x = 640x480 (fits in 720x720 with borders)
integer_scaling = true

; Window title (only visible if not fullscreen)
; window_title = M8 Headless

[audio]
; Enable M8 audio routing through SDL
; This routes the M8 USB audio to the R36S Plus speaker/headphones
audio_enabled = true

; Audio buffer size in samples (0 = SDL default ~256 samples)
; Lower = less latency but more CPU; 512 is stable on RK3326
audio_buffer_size = 512

; Specific audio output device name
; Leave empty to use system default (usually the built-in speaker)
audio_device_name =

; Keyboard key to toggle audio routing (F12 = scancode 69)
key_toggle_audio = F12

[keyboard]
; === R36S Plus Physical Button → M8 Function Mapping ===
;
; The R36S Plus has:
;   D-pad (up/down/left/right)
;   Face buttons: A(East), B(South), X(North), Y(West)
;   Shoulders: L1, R1, L2, R2
;   System: Select, Start
;   Analogs: Left stick, Right stick (L3, R3)
;
; M8 Tracker controls:
;   UP, DOWN, LEFT, RIGHT  → Navigation
;   A                      → Select/confirm
;   B                      → Back/delete
;   OPT                    → Modifier (like Ctrl)
;   EDIT                   → Edit mode modifier

; Navigation
key_up    = UP
key_down  = DOWN
key_left  = LEFT
key_right = RIGHT

; Primary actions
; A button (SDL_SCANCODE_RETURN or controller button)
key_select = RETURN
; B button
key_select_alt = KP_ENTER

; M8 A button → mapped to physical A
key_opt  = LSHIFT
key_opt_alt = RSHIFT

; M8 B button → mapped to physical B
key_edit  = SPACE
key_edit_alt = LCTRL

; Delete (useful for text editing on M8)
key_delete = DELETE

; Reset (disconnect/reconnect to M8)
key_reset = F4

; Toggle in-app settings menu
key_toggle_settings = F1

; Toggle log overlay
key_toggle_log = F2

[gamepad]
; === Gamepad / Analog Stick Settings ===

; Analog stick dead zone threshold (0-32767, default 16384 = 50%)
analog_threshold = 12000

; Invert analog axes
analog_invert = false

; Which axis controls M8 navigation when using analog sticks
; 0 = left stick X, 1 = left stick Y
analog_axis_updown = 1
analog_axis_leftright = 0

; Map analog axis for OPT and EDIT using right stick (optional)
; Set to -1 to disable
analog_axis_opt  = -1
analog_axis_edit = -1

[keyjazz]
; Keyjazz maps keyboard keys to musical notes for the M8
; These are the default QWERTY row mappings

; Octave control
key_jazz_inc_octave = KP_MULTIPLY
key_jazz_dec_octave = KP_DIVIDE

; Velocity control
key_jazz_inc_velocity = KP_PLUS
key_jazz_dec_velocity = KP_MINUS

; Note on/off
key_jazz_note_on  = KP_0
key_jazz_note_off = KP_PERIOD
